<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fear &amp; Greed Cadence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 30px; }
    header h1 { font-size: 1.8rem; color: #fff; }
    header p { color: #8899a6; margin-top: 5px; font-size: 0.9rem; }

    /* ── Desktop Layout ── */
    .dashboard { max-width: 960px; margin: 0 auto; }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .full-width { margin-bottom: 20px; }

    @media (max-width: 700px) {
      .top-row, .charts-row { grid-template-columns: 1fr; }
    }

    /* ── Signal Card ── */
    .signal-card {
      background: #1a2736;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      border: 1px solid #2a3a4a;
    }
    .coin-name { font-size: 1.1rem; color: #8899a6; margin-bottom: 5px; }
    .price { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
    .price-change { font-size: 1rem; margin-bottom: 20px; }
    .price-change.up { color: #00c853; }
    .price-change.down { color: #ff1744; }

    .signal {
      display: inline-block; padding: 12px 40px; border-radius: 30px;
      font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px;
    }
    .signal.buy { background: rgba(0,200,83,0.15); color: #00c853; border: 2px solid #00c853; }
    .signal.sell { background: rgba(255,23,68,0.15); color: #ff1744; border: 2px solid #ff1744; }
    .signal.hold { background: rgba(255,193,7,0.15); color: #ffc107; border: 2px solid #ffc107; }
    .signal.wait { background: rgba(136,153,166,0.15); color: #8899a6; border: 2px solid #556677; }
    .signal-reason { color: #8899a6; font-size: 0.85rem; margin-top: 8px; line-height: 1.5; }

    /* ── Card ── */
    .card {
      background: #1a2736; border-radius: 12px; padding: 20px;
      border: 1px solid #2a3a4a;
    }
    .card h3 { color: #fff; font-size: 0.95rem; margin-bottom: 14px; }

    /* ── Sidebar stats ── */
    .sidebar-stats {
      display: flex; flex-direction: column; gap: 16px;
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #2a3a4a;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label-sm { font-size: 0.78rem; color: #8899a6; }
    .stat-value-sm { font-size: 1rem; font-weight: 600; }

    /* ── Indicators (horizontal in signal card) ── */
    .indicators-inline {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
      margin-top: 16px; padding-top: 16px; border-top: 1px solid #2a3a4a;
    }
    .ind-item { text-align: center; }
    .ind-item .ind-label { font-size: 0.68rem; color: #8899a6; text-transform: uppercase; letter-spacing: 0.5px; }
    .ind-item .ind-value { font-size: 1.2rem; font-weight: 600; margin-top: 2px; }
    .ind-item .ind-sub { font-size: 0.72rem; color: #556677; margin-top: 1px; }

    /* ── Checklist ── */
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #2a3a4a; font-size: 0.85rem;
    }
    .check-item:last-child { border-bottom: none; }
    .check-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
    }
    .check-icon.pass { background: rgba(0,200,83,0.2); color: #00c853; }
    .check-icon.fail { background: rgba(255,23,68,0.2); color: #ff1744; }

    /* ── Portfolio row ── */
    .portfolio-summary {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    @media (max-width: 700px) { .portfolio-summary { grid-template-columns: 1fr 1fr; } }
    .portfolio-stat { background: #0f1923; border-radius: 8px; padding: 12px; text-align: center; }
    .portfolio-stat .ps-label { font-size: 0.68rem; color: #8899a6; text-transform: uppercase; letter-spacing: 0.5px; }
    .portfolio-stat .ps-value { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }

    /* ── Trade Log ── */
    .trade-log-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .trade-log-table th {
      text-align: left; padding: 8px 6px; color: #8899a6;
      border-bottom: 1px solid #2a3a4a; font-weight: 600;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .trade-log-table td { padding: 8px 6px; border-bottom: 1px solid rgba(42,58,74,0.5); }
    .trade-log-table tr:last-child td { border-bottom: none; }
    .trade-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .trade-tag.buy { background: rgba(0,200,83,0.15); color: #00c853; }
    .trade-tag.sell { background: rgba(255,23,68,0.15); color: #ff1744; }
    .pnl-pos { color: #00c853; }
    .pnl-neg { color: #ff1744; }
    .trade-log-empty { color: #556677; text-align: center; padding: 20px; font-size: 0.85rem; }

    /* ── Settings Section ── */
    .settings-section {
      margin-top: 30px; padding-top: 24px; border-top: 1px solid #2a3a4a;
    }
    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 8px 0; margin-bottom: 16px;
    }
    .settings-header h2 { font-size: 1rem; color: #8899a6; font-weight: 600; }
    .settings-header .arrow { color: #556677; font-size: 0.9rem; transition: transform 0.2s; }
    .settings-header .arrow.open { transform: rotate(180deg); }

    .settings-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    @media (max-width: 700px) { .settings-grid { grid-template-columns: 1fr; } }

    .settings-grid .card { margin-bottom: 0; }

    /* ── Toggle Switch ── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; font-size: 0.85rem;
    }
    .toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: #2a3a4a; border-radius: 12px; transition: 0.3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 3px; bottom: 3px; background: #8899a6; border-radius: 50%; transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #4a9eff; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

    .btn-sm {
      background: transparent; border: 1px solid #2a3a4a; color: #8899a6;
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: #4a9eff; color: #4a9eff; }

    .btn-primary {
      padding: 10px 18px; background: #4a9eff; border: none; border-radius: 8px;
      color: #fff; font-weight: 600; cursor: pointer; font-size: 0.85rem;
    }
    .btn-primary:hover { background: #3a8eef; }

    /* ── Email Form ── */
    .email-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .email-form input {
      padding: 10px 14px; background: #0f1923; border: 1px solid #2a3a4a;
      border-radius: 8px; color: #fff; font-size: 0.85rem; outline: none; font-family: monospace;
    }
    .email-form input.email-to { font-family: inherit; }
    .email-form input:focus { border-color: #4a9eff; }
    .email-form input::placeholder { color: #556677; }
    .email-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
    }
    .email-status.configured { background: rgba(0,200,83,0.15); color: #00c853; }
    .email-status.error { background: rgba(255,23,68,0.15); color: #ff1744; }
    .email-status.sending { background: rgba(74,158,255,0.15); color: #4a9eff; }
    .email-setup-steps {
      margin-top: 10px; padding: 12px; background: #0f1923; border-radius: 8px;
      font-size: 0.75rem; color: #8899a6; line-height: 1.8;
    }
    .email-setup-steps ol { padding-left: 18px; }
    .email-setup-steps a { color: #4a9eff; text-decoration: none; }
    .email-setup-steps code { background: #1a2736; padding: 1px 6px; border-radius: 3px; color: #ccc; font-size: 0.73rem; }

    /* ── Kraken input ── */
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ── Misc ── */
    .updated { text-align: center; color: #556677; font-size: 0.8rem; margin: 24px 0; }
    .explainer p { color: #8899a6; font-size: 0.82rem; line-height: 1.6; margin-bottom: 8px; }
    .explainer strong { color: #ccc; }

    .loading { text-align: center; color: #8899a6; padding: 60px 20px; font-size: 1.1rem; }
    .loading .spinner {
      display: inline-block; width: 30px; height: 30px;
      border: 3px solid #2a3a4a; border-top-color: #4a9eff;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes flash-green { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 30px rgba(0,200,83,0.5); } }
    @keyframes flash-red { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 30px rgba(255,23,68,0.5); } }
    .signal-card.flash-buy { animation: flash-green 0.6s ease 3; }
    .signal-card.flash-sell { animation: flash-red 0.6s ease 3; }
    .clear-log-btn {
      background: transparent; border: 1px solid #2a3a4a; color: #8899a6;
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.72rem;
      float: right; margin-top: -8px; margin-bottom: 8px;
    }
    .clear-log-btn:hover { border-color: #ff1744; color: #ff1744; }
  </style>
</head>
<body>
  <header>
    <h1>Fear &amp; Greed Cadence</h1>
    <p>Composite strategy signal for Bitcoin</p>
  </header>

  <div id="app" class="dashboard">
    <div class="loading"><div class="spinner"></div><div>Loading market data...</div></div>
  </div>

  <script>
    const REFRESH_SECONDS = 300;
    let previousSignal = null;
    let soundEnabled = JSON.parse(localStorage.getItem('cadence_sound') ?? 'true');

    // ── Sound Alerts ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playBuySound() {
      ensureAudioCtx();
      const now = audioCtx.currentTime;
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.3, now + i * 0.15);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.4);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now + i * 0.15); o.stop(now + i * 0.15 + 0.4);
      });
    }
    function playSellSound() {
      ensureAudioCtx();
      const now = audioCtx.currentTime;
      [392.00, 293.66, 220.00].forEach((freq, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.35, now + i * 0.18);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.35);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now + i * 0.18); o.stop(now + i * 0.18 + 0.35);
      });
    }
    function playAlertIfChanged(s) {
      if (!soundEnabled) return;
      if (previousSignal === null) { previousSignal = s; return; }
      if (s === previousSignal) return;
      if (s === 'buy') playBuySound(); else if (s === 'sell') playSellSound();
      previousSignal = s;
    }

    // ── Email Alerts ──
    function getEmailConfig() { return JSON.parse(localStorage.getItem('cadence_email_config') ?? 'null'); }
    function saveEmailConfig(c) { localStorage.setItem('cadence_email_config', JSON.stringify(c)); }
    function removeEmailConfig() { localStorage.removeItem('cadence_email_config'); }
    let emailEnabled = JSON.parse(localStorage.getItem('cadence_email_enabled') ?? 'true');
    const EMAILJS_DEFAULTS = { serviceId: 'service_0p9s6c8', templateId: 'template_i8uns8k', publicKey: 'VUb6rL8d66laEejG5' };
    function initEmailJS() { const c = getEmailConfig(); emailjs.init(c?.publicKey || EMAILJS_DEFAULTS.publicKey); }
    async function sendSignalEmail(signal, btcPrice, cadenceValue, fg, ema200) {
      const c = getEmailConfig(); if (!c || !emailEnabled) return;
      const su = signal.toUpperCase();
      const ps = '$' + btcPrice.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
      const es = '$' + ema200.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
      const now = new Date().toLocaleString();
      try {
        await emailjs.send(c.serviceId, c.templateId, {
          to_email: c.toEmail, signal: su, btc_price: ps, cadence_value: cadenceValue.toFixed(1),
          fear_greed: fg, ema_200: es, timestamp: now,
          subject: `Cadence Signal: ${su} @ ${ps}`,
          message: `The Fear & Greed Cadence indicator has flipped to ${su}.\n\nBTC Price: ${ps}\nCadence (60d SMA): ${cadenceValue.toFixed(1)}\nFear & Greed: ${fg}\n200-Day EMA: ${es}\nTime: ${now}\n\n${signal === 'buy' ? 'All 3 buy conditions are met. Consider entering a position.' : 'Cadence has dropped below zero. Consider exiting to cash.'}`
        });
        return true;
      } catch (e) { console.error('Email send failed:', e); return false; }
    }
    let lastEmailedSignal = localStorage.getItem('cadence_last_emailed_signal') || null;
    async function emailAlertIfChanged(signal, btcPrice, cv, fg, ema) {
      if (signal === lastEmailedSignal || (signal !== 'buy' && signal !== 'sell')) return;
      if (await sendSignalEmail(signal, btcPrice, cv, fg, ema)) {
        lastEmailedSignal = signal; localStorage.setItem('cadence_last_emailed_signal', signal);
      }
    }
    initEmailJS();

    // ── Browser Notifications ──
    let notifEnabled = JSON.parse(localStorage.getItem('cadence_notif') ?? 'false');
    let lastNotifSignal = localStorage.getItem('cadence_last_notif_signal') || null;
    async function requestNotifPermission() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      return (await Notification.requestPermission()) === 'granted';
    }
    async function toggleNotif(checked) {
      if (checked) { const ok = await requestNotifPermission(); if (!ok) { alert('Permission denied.'); notifEnabled = false; localStorage.setItem('cadence_notif','false'); update(); return; } }
      notifEnabled = checked; localStorage.setItem('cadence_notif', JSON.stringify(checked));
    }
    function sendBrowserNotif(signal, btcPrice) {
      if (!notifEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
      if (signal === lastNotifSignal || (signal !== 'buy' && signal !== 'sell')) return;
      const ps = '$' + btcPrice.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
      new Notification(`Cadence: ${signal.toUpperCase()} @ ${ps}`, {
        body: signal === 'buy' ? 'All 3 buy conditions met.' : 'Cadence below zero. Exit to cash.',
        tag: 'cadence-signal'
      });
      lastNotifSignal = signal; localStorage.setItem('cadence_last_notif_signal', signal);
    }

    // ── CSV Export ──
    function exportTradesToCSV() {
      const trades = getTrades();
      if (!trades.length) { alert('No trades to export.'); return; }
      const rows = ['Date,Action,BTC Price,BTC Amount,USD Amount,P&L %',
        ...trades.map(t => `${new Date(t.date).toLocaleDateString('en-US')},${t.type},${t.price.toFixed(2)},${t.btcAmount?t.btcAmount.toFixed(8):''},${t.usdAmount?t.usdAmount.toFixed(2):''},${t.pnl!==null?t.pnl.toFixed(2):''}`)
      ].join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([rows], {type:'text/csv'}));
      a.download = `cadence-trades-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    // ── Time in Position ──
    function getTimeInPosition() {
      const trades = getTrades(); if (!trades.length) return null;
      const last = trades[trades.length - 1];
      return { type: last.type, days: Math.floor((Date.now() - new Date(last.date).getTime()) / 864e5) };
    }

    // ── Sparkline SVG ──
    function buildSparklineSVG(prices, width = 520, height = 80) {
      const data = prices.slice(-30).map(p => p.price);
      if (data.length < 2) return '';
      const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
      const pts = data.map((v, i) => `${(i/(data.length-1))*width},${height-((v-min)/range)*(height-4)-2}`).join(' ');
      const color = data[data.length-1] >= data[0] ? '#00c853' : '#ff1744';
      return `<svg width="100%" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block;">
        <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>
        <polygon points="0,${height} ${pts} ${width},${height}" fill="url(#sg)"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${width}" cy="${height-((data[data.length-1]-min)/range)*(height-4)-2}" r="3" fill="${color}"/>
      </svg>`;
    }

    // ── Trade Log ──
    function getTrades() { return JSON.parse(localStorage.getItem('cadence_trades') ?? '[]'); }
    function saveTrades(t) { localStorage.setItem('cadence_trades', JSON.stringify(t)); }
    function addTrade(type, price) {
      const trades = getTrades();
      const trade = { id: Date.now(), type, price, date: new Date().toISOString(), btcAmount: null, pnl: null };
      if (type === 'buy') { const p = getPortfolio(); if (p.cash > 0) { trade.btcAmount = p.cash / price; trade.usdAmount = p.cash; } }
      else { const lb = [...trades].reverse().find(t => t.type === 'buy'); if (lb) { trade.pnl = ((price - lb.price) / lb.price) * 100; trade.usdAmount = lb.btcAmount ? lb.btcAmount * price : null; } }
      trades.push(trade); saveTrades(trades); return trade;
    }

    // ── Portfolio ──
    function getPortfolio() { return JSON.parse(localStorage.getItem('cadence_portfolio') ?? '{"cash":10000,"startingCash":10000}'); }
    function savePortfolio(p) { localStorage.setItem('cadence_portfolio', JSON.stringify(p)); }
    function recalcPortfolio(currentPrice) {
      const trades = getTrades(), p = getPortfolio(); let cash = p.startingCash, btc = 0;
      for (const t of trades) { if (t.type === 'buy' && cash > 0) { btc = cash / t.price; cash = 0; } else if (t.type === 'sell' && btc > 0) { cash = btc * t.price; btc = 0; } }
      return { cash, btc, startingCash: p.startingCash, totalValue: cash + btc * currentPrice };
    }

    // ── Kraken Portfolio (manual entry) ──
    function getKrakenPortfolio() {
      return JSON.parse(localStorage.getItem('cadence_kraken') ?? '{"btc":0,"usd":0}');
    }
    function saveKrakenPortfolio(btc, usd) {
      localStorage.setItem('cadence_kraken', JSON.stringify({ btc: parseFloat(btc) || 0, usd: parseFloat(usd) || 0 }));
    }
    function clearKrakenPortfolio() {
      localStorage.removeItem('cadence_kraken');
    }

    // ── Data Fetchers ──
    async function fetchFearGreed() {
      const r = await fetch('https://api.alternative.me/fng/?limit=0&format=json'); if (!r.ok) throw new Error('F&G API error');
      return (await r.json()).data.map(d => ({ value: parseInt(d.value,10), date: new Date(parseInt(d.timestamp,10)*1000) })).reverse();
    }
    async function fetchBTCPrices() {
      const r = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=250&interval=daily'); if (!r.ok) throw new Error('CoinGecko API error');
      return (await r.json()).prices.map(p => ({ date: new Date(p[0]), price: p[1] }));
    }

    // ── Indicators ──
    function calculateCadence(fg, lookback = 90) { const c = []; for (let i = lookback; i < fg.length; i++) c.push({ value: fg[i].value - fg[i-lookback].value, date: fg[i].date, fg: fg[i].value }); return c; }
    function sma(data, period) { const r = []; for (let i = period-1; i < data.length; i++) { let s = 0; for (let j = i-period+1; j<=i; j++) s += data[j].value; r.push({ value: s/period, date: data[i].date, fg: data[i].fg }); } return r; }
    function calculateEMA(prices, period) { if (prices.length < period) return null; const k = 2/(period+1); let e = prices.slice(0,period).reduce((a,b)=>a+b.price,0)/period; for (let i = period; i < prices.length; i++) e = prices[i].price*k + e*(1-k); return e; }
    function getSignal(sm, price, ema, fg) {
      const latest = sm[sm.length-1]?.value ?? null;
      const abv = latest !== null && latest > 0, pAbv = price > ema, fAbv = fg > 20;
      let signal, reasons = [];
      if (abv && pAbv && fAbv) { signal = 'buy'; reasons.push('All 3 buy conditions met'); }
      else if (!abv) { signal = 'sell'; reasons.push('Cadence below zero \u2014 exit to cash'); }
      else { signal = 'hold'; if (!pAbv) reasons.push('Price below 200-day EMA'); if (!fAbv) reasons.push('F&G below 20'); }
      return { signal, reasons, checks: { cadenceAboveZero: abv, priceAboveEMA: pAbv, fgAbove20: fAbv }, cadenceValue: latest, ema200: ema };
    }

    // ── Auto-log ──
    let lastLoggedSignal = localStorage.getItem('cadence_last_logged_signal') || null;
    function autoLogTrade(signal, price) {
      if (signal === lastLoggedSignal) return;
      if (signal === 'buy' || signal === 'sell') { addTrade(signal, price); lastLoggedSignal = signal; localStorage.setItem('cadence_last_logged_signal', signal); }
    }

              <div class="toggle-row"><span>Sound alerts</span><label class="toggle-switch"><input type="checkbox" ${soundEnabled?'checked':''} onchange="soundEnabled=this.checked;localStorage.setItem('cadence_sound',this.checked)"><span class="toggle-slider"></span></label></div>
              <div style="display:flex;gap:8px;margin:6px 0;"><button class="btn-sm" onclick="playBuySound()">Test Buy</button><button class="btn-sm" onclick="playSellSound()">Test Sell</button></div>
              <div class="toggle-row" style="border-top:1px solid #2a3a4a;margin-top:8px;padding-top:8px;"><span>Browser notifications</span><label class="toggle-switch"><input type="checkbox" ${notifEnabled?'checked':''} onchange="toggleNotif(this.checked)"><span class="toggle-slider"></span></label></div>
            </div>

            <!-- Email -->
            <div class="card">
              <h3>Email Alerts</h3>
              ${renderEmailCard()}
            </div>

            <!-- Kraken Portfolio -->
            <div class="card">
              <h3>Kraken Portfolio</h3>
              ${krakenHtml}
            </div>

            <!-- About -->
            <div class="card explainer">
              <h3>How it works</h3>
              <p><strong>Cadence</strong> = today's F&amp;G minus 90 days ago. Smoothed with 60-day SMA.</p>
              <p><strong>Buy</strong> when: Cadence &gt; 0, price &gt; 200 EMA, F&amp;G &gt; 20.</p>
              <p><strong>Sell</strong> when: Cadence drops below 0. Immediate exit.</p>
              <p><strong>Paper trading</strong> starts at $10k. Trades auto-log on signal change.</p>
              <p style="color:#ff9800;margin-top:8px;"><strong>Disclaimer:</strong> Learning purposes only. Not financial advice.</p>
            </div>
          </div>
        </div>
      `;

      playAlertIfChanged(signalData.signal);
      sendBrowserNotif(signalData.signal, btcPrice);
      emailAlertIfChanged(signalData.signal, btcPrice, signalData.cadenceValue, currentFG, signalData.ema200);
      autoLogTrade(signalData.signal, btcPrice);
    }

    // ── Main ──
    async function update() {
      const app = document.getElementById('app');
      try {
        app.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading data...</div></div>';
        const [fgData, priceData] = await Promise.all([fetchFearGreed(), fetchBTCPrices()]);
        const currentFG = fgData[fgData.length-1].value, currentPrice = priceData[priceData.length-1].price;
        const prevPrice = priceData[priceData.length-2].price, priceChange = ((currentPrice-prevPrice)/prevPrice)*100;
        const ema200 = calculateEMA(priceData, 200), cadence = calculateCadence(fgData, 90), smoothed = sma(cadence, 60);
        render(currentPrice, priceChange, getSignal(smoothed, currentPrice, ema200, currentFG), smoothed, currentFG, priceData);
      } catch (err) {
        app.innerHTML = `<div class="signal-card" style="color:#ff1744;"><h3>Error loading data</h3><p style="margin-top:10px;color:#8899a6;">${err.message}</p><p style="margin-top:10px;color:#8899a6;">Wait a minute and refresh.</p></div>`;
      }
    }
    setInterval(update, REFRESH_SECONDS * 1000);
    update();
  </script>
</body>
</html>
